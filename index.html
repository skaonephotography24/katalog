<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkaOne Photography</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f8fafc;
}
.brand {
  font-family: 'Playfair Display', serif;
}
.card {
  transition: all 0.3s ease;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}
</style>
</head>

<body class="text-gray-800">

<!-- HEADER -->
<header class="sticky top-0 bg-white/80 backdrop-blur border-b z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <div class="flex items-center gap-3">
      <img src="logo.png" class="w-10">
      <h1 class="brand text-xl text-black">
        SkaOne Photography Katalog
      </h1>
    </div>

    <input id="searchInput" onkeyup="filterProducts()"
      placeholder="Cari..."
      class="px-3 py-2 border rounded-xl text-sm w-48">
  </div>
</header>

<!-- KATALOG -->
<div class="max-w-7xl mx-auto px-4 py-8">
  <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<!-- MODAL -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">

  <div class="bg-white rounded-3xl max-w-lg w-full p-6 relative">

    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 text-xl">
      ✕
    </button>

    <!-- SLIDER -->
    <div class="relative mb-4 overflow-hidden rounded-xl">

      <div id="sliderTrack"
           class="flex transition-transform duration-500 ease-in-out">
      </div>

      <button onclick="prevSlide()"
        class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-2 rounded-full">
        ❮
      </button>

      <button onclick="nextSlide()"
        class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-2 rounded-full">
        ❯
      </button>

    </div>

    <!-- DOT -->
    <div id="sliderDots" class="flex justify-center gap-2 mb-4"></div>

    <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
    <p id="modalDesc" class="text-gray-600 text-sm mb-4"></p>
    <p id="modalPrice" class="text-2xl font-bold text-emerald-600 mb-6"></p>

    <div class="flex gap-3">
      <button id="btnOrder"
        class="flex-1 bg-red-500 text-white py-3 rounded-xl">
        Order Now
      </button>

      <button onclick="closeModal()"
        class="flex-1 bg-blue-500 text-white py-3 rounded-xl">
        Kembali
      </button>
    </div>

  </div>
</div>

<script>
let products = [];
let currentProduct = null;

/* SLIDER STATE */
let currentSlide = 0;
let currentGallery = [];
let autoSlideInterval = null;

/* LOAD DATA */
async function loadProducts() {
  const res = await fetch('data.json');
  const data = await res.json();

  products = data.map(p => ({
    ...p,
    image: "images/" + p.image
  }));

  renderCatalog(products);
}

/* RENDER */
function renderCatalog(data) {
  const grid = document.getElementById('catalogGrid');

  grid.innerHTML = data.map(p => `
    <div onclick="showDetail(${p.id})"
         class="card bg-white rounded-2xl p-4 cursor-pointer">

      <img src="${p.image}" class="w-full h-48 object-cover rounded-xl mb-3">

      <h3 class="font-semibold text-lg">${p.title}</h3>

      <p class="text-emerald-600 font-bold mb-2">
        Rp ${p.price.toLocaleString('id-ID')}
      </p>

      <p class="text-sm text-gray-500">
        ${p.description.substring(0,60)}...
      </p>

    </div>
  `).join('');
}

/* DETAIL */
function showDetail(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  currentProduct = p;

  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalDesc').textContent = p.description;
  document.getElementById('modalPrice').textContent =
    "Rp " + p.price.toLocaleString('id-ID');

  const gallery = p.gallery && p.gallery.length ? p.gallery : [p.image.replace("images/","")];
  initSlider(gallery);

  document.getElementById('detailModal').classList.remove('hidden');
}

/* SLIDER INIT */
function initSlider(gallery) {
  const track = document.getElementById('sliderTrack');
  const dots = document.getElementById('sliderDots');

  currentGallery = gallery;
  currentSlide = 0;

  track.innerHTML = gallery.map(img => `
    <img src="images/${img}" class="w-full flex-shrink-0 h-56 object-cover">
  `).join('');

  dots.innerHTML = gallery.map((_, i) => `
    <div onclick="goToSlide(${i})"
      class="dot w-2.5 h-2.5 rounded-full bg-gray-300 cursor-pointer"></div>
  `).join('');

  updateSlider();
  startAutoSlide();
  enableSwipe();
}

/* UPDATE */
function updateSlider() {
  const track = document.getElementById('sliderTrack');
  track.style.transform = `translateX(-${currentSlide * 100}%)`;
  updateDots();
}

function updateDots() {
  const dots = document.querySelectorAll('#sliderDots .dot');

  dots.forEach((dot, i) => {
    if (i === currentSlide) {
      dot.classList.add('bg-black','scale-125');
      dot.classList.remove('bg-gray-300');
    } else {
      dot.classList.remove('bg-black','scale-125');
      dot.classList.add('bg-gray-300');
    }
  });
}

/* NAV */
function nextSlide() {
  currentSlide = (currentSlide + 1) % currentGallery.length;
  updateSlider();
}

function prevSlide() {
  currentSlide = (currentSlide - 1 + currentGallery.length) % currentGallery.length;
  updateSlider();
}

function goToSlide(i) {
  currentSlide = i;
  updateSlider();
}

/* AUTO */
function startAutoSlide() {
  clearInterval(autoSlideInterval);
  autoSlideInterval = setInterval(nextSlide, 3000);
}

function stopAutoSlide() {
  clearInterval(autoSlideInterval);
}

/* SWIPE */
function enableSwipe() {
  const slider = document.getElementById('sliderTrack');

  let startX = 0;
  let endX = 0;

  slider.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  });

  slider.addEventListener('touchend', e => {
    endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) nextSlide();
    if (endX - startX > 50) prevSlide();
  });
}

/* CLOSE */
function closeModal() {
  document.getElementById('detailModal').classList.add('hidden');
  stopAutoSlide();
}

/* ORDER */
document.getElementById('btnOrder').onclick = function() {
  if (!currentProduct) return;

  const msg = `Halo, saya ingin pesan:\n${currentProduct.title}\nRp ${currentProduct.price.toLocaleString('id-ID')}`;

  window.open(`https://wa.me/6285712130175?text=${encodeURIComponent(msg)}`);
};

/* SEARCH */
function filterProducts() {
  const keyword = document.getElementById('searchInput').value.toLowerCase();

  const filtered = products.filter(p =>
    p.title.toLowerCase().includes(keyword) ||
    p.description.toLowerCase().includes(keyword)
  );

  renderCatalog(filtered);
}

/* INIT */
window.onload = loadProducts;
</script>

</body>
</html>
