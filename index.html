<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Katalog Produk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <div class="container mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-center">Katalog Produk</h1>

    <div id="catalog" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white rounded-2xl p-6 max-w-lg w-full relative">
      <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
      <p id="modalDesc" class="mb-4 text-gray-600"></p>

      <div id="modalGallery" class="grid grid-cols-2 gap-2 mb-4"></div>

      <button onclick="closeModal()" 
        class="bg-blue-500 text-white px-4 py-2 rounded-xl hover:bg-blue-600">
        Oke, paham
      </button>
    </div>
  </div>

  <script>
    const catalog = document.getElementById("catalog");

    fetch("data.json")
      .then(res => res.json())
      .then(data => {
        data.forEach(item => {
          const card = document.createElement("div");
          card.className = "bg-white rounded-2xl shadow hover:shadow-lg transition cursor-pointer";

          card.innerHTML = `
            <img src="${item.image}" class="rounded-t-2xl w-full h-48 object-cover">
            <div class="p-4">
              <h2 class="font-bold text-lg">${item.title}</h2>
              <p class="text-gray-500">${item.price}</p>
            </div>
          `;

          card.onclick = () => openModal(item);
          catalog.appendChild(card);
        });
      });

    function openModal(item) {
      document.getElementById("modalTitle").innerText = item.title;
      document.getElementById("modalDesc").innerText = item.description;

      const gallery = document.getElementById("modalGallery");
      gallery.innerHTML = "";

      item.gallery.forEach(img => {
        const image = document.createElement("img");
        image.src = img;
        image.className = "rounded-lg w-full h-24 object-cover";
        gallery.appendChild(image);
      });

      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("modal").classList.add("flex");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      document.getElementById("modal").classList.remove("flex");
    }
  </script>

</body>
</html>
