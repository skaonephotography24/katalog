<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
    }

    /* CARD */
    .card {
      transition: all 0.35s ease;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 25px 40px rgba(0,0,0,0.08);
    }

    @keyframes fadeUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* IMAGE */
    .img-wrap {
      overflow: hidden;
      border-radius: 1rem;
    }

    .img-wrap img {
      transition: transform 0.5s ease;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    /* BUTTON */
    .btn-order {
      background: linear-gradient(135deg, #10b981, #059669);
      transition: all 0.3s ease;
    }

    .btn-order:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(16,185,129,0.3);
    }

    /* SEARCH */
    .search-box {
      transition: all 0.3s ease;
    }

    .search-box:focus {
      box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
      border-color: #10b981;
    }

    /* HEADER BLUR */
    header {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.7);
    }
  </style>
</head>

<body class="font-sans text-gray-800">

<!-- HEADER -->
<header class="sticky top-0 z-50 border-b">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-emerald-600 tracking-tight">
      KatalogKu
    </h1>
  </div>
</header>

<div class="max-w-7xl mx-auto px-4 py-8">

  <!-- SEARCH -->
  <div class="mb-8">
    <div class="relative">
      <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input id="searchInput"
        onkeyup="filterProducts()"
        type="text"
        placeholder="Cari produk..."
        class="search-box w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-200 outline-none text-lg bg-white shadow-sm">
    </div>
  </div>

  <!-- GRID -->
  <div id="catalogGrid"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
  </div>

</div>

<script>
/* ================= DATA ================= */
let products = [];

/* ================= LOAD JSON ================= */
async function loadProducts() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('Gagal load');

    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('Format salah');

    products = data;
    renderCatalog(products);

  } catch (err) {
    console.error(err);
    alert('Gagal memuat data.json');
  }
}

/* ================= RENDER ================= */
function renderCatalog(data) {
  const grid = document.getElementById('catalogGrid');

  grid.innerHTML = data.map((p, i) => `
    <div class="card bg-white rounded-3xl p-4"
         style="animation-delay: ${i * 0.08}s">

      <div class="img-wrap mb-4">
        <img src="${p.image}" class="w-full h-52 object-cover">
      </div>

      <h3 class="font-semibold text-lg mb-1 line-clamp-2">
        ${p.title}
      </h3>

      <p class="text-emerald-600 text-xl font-bold mb-2">
        Rp ${p.price.toLocaleString('id-ID')}
      </p>

      <p class="text-gray-500 text-sm mb-4 leading-relaxed">
        ${p.description.substring(0, 80)}...
      </p>

      <button onclick="orderNow(${p.id})"
        class="btn-order w-full text-white py-3 rounded-xl font-medium flex items-center justify-center gap-2">
        <i class="fas fa-bolt"></i> Order Sekarang
      </button>

    </div>
  `).join('');
}

/* ================= SEARCH ================= */
function filterProducts() {
  const keyword = document.getElementById('searchInput').value.toLowerCase();

  const filtered = products.filter(p =>
    p.title.toLowerCase().includes(keyword) ||
    p.description.toLowerCase().includes(keyword)
  );

  renderCatalog(filtered);
}

/* ================= ORDER ================= */
function orderNow(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  const msg = `Halo, saya ingin pesan:\n${p.title}\nRp ${p.price.toLocaleString('id-ID')}`;

  window.open(`https://wa.me/6285712130175?text=${encodeURIComponent(msg)}`);
}

/* ================= INIT ================= */
window.onload = loadProducts;
</script>

</body>
</html>
