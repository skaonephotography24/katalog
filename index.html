<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Katalog Produk</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Animasi modal */
    .fade-in {
      animation: fadeIn 0.3s ease forwards;
    }

    .scale-in {
      animation: scaleIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0 }
      to { opacity: 1 }
    }

    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0 }
      to { transform: scale(1); opacity: 1 }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen">

  <!-- HEADER -->
  <div class="bg-white shadow-md sticky top-0 z-10">
    <div class="container mx-auto p-4 flex items-center justify-between">
      
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <img src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full">
        <h1 class="text-xl font-bold">SkaOne Photography</h1>
      </div>

      <!-- Search -->
      <input 
        type="text" 
        id="search"
        placeholder="Cari produk..."
        class="border rounded-xl px-4 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
      >
    </div>
  </div>

  <!-- KATALOG -->
  <div class="container mx-auto p-6">
    <div id="catalog" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div id="modalContent" class="bg-white rounded-2xl p-6 max-w-lg w-full relative transform scale-95 opacity-0">
      
      <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
      <p id="modalDesc" class="mb-4 text-gray-600"></p>

      <div id="modalGallery" class="grid grid-cols-2 gap-2 mb-4"></div>

      <button onclick="closeModal()" 
        class="bg-blue-500 text-white px-4 py-2 rounded-xl hover:bg-blue-600 transition">
        Oke, paham
      </button>
    </div>
  </div>

  <script>
    const catalog = document.getElementById("catalog");
    const searchInput = document.getElementById("search");

    let allData = [];

    fetch("data.json")
      .then(res => res.json())
      .then(data => {
        allData = data;
        renderData(data);
      });

    function renderData(data) {
      catalog.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");

        card.className = `
          bg-white rounded-2xl shadow-md hover:shadow-xl 
          transition duration-300 cursor-pointer
          transform hover:-translate-y-2 hover:scale-[1.02]
        `;

        card.innerHTML = `
          <img src="${item.image}" class="rounded-t-2xl w-full h-48 object-cover">
          <div class="p-4">
            <h2 class="font-bold text-lg">${item.title}</h2>
            <p class="text-blue-500 font-semibold">${item.price}</p>
          </div>
        `;

        card.onclick = () => openModal(item);
        catalog.appendChild(card);
      });
    }

    // SEARCH FILTER
    searchInput.addEventListener("input", () => {
      const keyword = searchInput.value.toLowerCase();

      const filtered = allData.filter(item =>
        item.title.toLowerCase().includes(keyword)
      );

      renderData(filtered);
    });

    function openModal(item) {
      document.getElementById("modalTitle").innerText = item.title;
      document.getElementById("modalDesc").innerText = item.description;

      const gallery = document.getElementById("modalGallery");
      gallery.innerHTML = "";

      item.gallery.forEach(img => {
        const image = document.createElement("img");
        image.src = img;
        image.className = "rounded-lg w-full h-24 object-cover hover:scale-105 transition";
        gallery.appendChild(image);
      });

      const modal = document.getElementById("modal");
      const content = document.getElementById("modalContent");

      modal.classList.remove("hidden");
      modal.classList.add("flex");

      // trigger animasi
      setTimeout(() => {
        content.classList.add("fade-in", "scale-in");
        content.classList.remove("scale-95", "opacity-0");
      }, 10);
    }

    function closeModal() {
      const modal = document.getElementById("modal");
      const content = document.getElementById("modalContent");

      content.classList.remove("fade-in", "scale-in");
      content.classList.add("scale-95", "opacity-0");

      setTimeout(() => {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }, 200);
    }
  </script>

</body>
</html>
