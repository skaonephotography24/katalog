<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkaOne Photography</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; background:#f8fafc; }
.brand { font-family:'Playfair Display', serif; }

/* CARD */
.card { transition:0.3s; }
.card:hover { transform:translateY(-8px); box-shadow:0 20px 40px rgba(0,0,0,0.1); }

/* CINEMATIC */
.cinematic-img { animation:zoom 8s ease-in-out infinite alternate; }
@keyframes zoom { from{transform:scale(1)} to{transform:scale(1.1)} }

.cinematic-overlay::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.4),transparent);
}

/* MODAL */
.modal-box { animation:fade 0.5s ease; }
@keyframes fade {
  from{opacity:0; transform:translateY(30px) scale(0.95);}
  to{opacity:1; transform:translateY(0) scale(1);}
}

/* SLIDER */
#sliderTrack { transition:transform 0.8s cubic-bezier(0.22,1,0.36,1); }
</style>
</head>

<body>

<!-- HEADER -->
<header class="sticky top-0 bg-white/80 backdrop-blur border-b z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <div class="flex items-center gap-3">
      <img src="logo.png" class="w-10">
      <h1 class="brand text-xl">SkaOne Photography Katalog</h1>
    </div>

    <input id="searchInput" onkeyup="filterProducts()"
      placeholder="Cari..." class="px-3 py-2 border rounded-xl text-sm w-48">
  </div>
</header>

<!-- KATALOG -->
<div class="max-w-7xl mx-auto px-4 py-8">
  <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<!-- MODAL -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
  <div class="modal-box bg-white rounded-3xl max-w-lg w-full p-6 relative">

    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 text-xl">✕</button>

    <div class="relative mb-4 overflow-hidden rounded-xl">
      <div id="sliderTrack" class="flex"></div>

      <button onclick="prevSlide()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-2 rounded-full">❮</button>
      <button onclick="nextSlide()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-2 rounded-full">❯</button>
    </div>

    <div id="sliderDots" class="flex justify-center gap-2 mb-4"></div>

    <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
    <p id="modalDesc" class="text-gray-600 text-sm mb-4"></p>
    <p id="modalPrice" class="text-2xl font-bold text-emerald-600 mb-6"></p>

    <div class="flex gap-3">
      <button id="btnOrder" class="flex-1 bg-red-500 text-white py-3 rounded-xl">Order Now</button>
      <button onclick="closeModal()" class="flex-1 bg-blue-500 text-white py-3 rounded-xl">Kembali</button>
    </div>

  </div>
</div>

<!-- FULLSCREEN -->
<div id="fullscreenGallery" class="hidden fixed inset-0 bg-black z-[999] flex items-center justify-center">
  <button onclick="closeFullscreen()" class="absolute top-5 right-5 text-white text-2xl">✕</button>
  <img id="fullscreenImage" class="max-w-full max-h-full transition-transform duration-300">
</div>

<script>
let products=[];
let currentProduct=null;

/* SLIDER */
let currentSlide=0;
let currentGallery=[];
let autoSlideInterval=null;

/* ZOOM */
let zoomLevel=1;

/* LOAD */
async function loadProducts(){
  const res=await fetch('data.json');
  const data=await res.json();

  products=data.map(p=>({...p,image:"images/"+p.image}));
  renderCatalog(products);
}

/* RENDER */
function renderCatalog(data){
  const grid=document.getElementById('catalogGrid');
  grid.innerHTML=data.map(p=>`
    <div onclick="showDetail(${p.id})" class="card bg-white rounded-2xl p-4 cursor-pointer">
      <img src="${p.image}" class="w-full h-48 object-cover rounded-xl mb-3">
      <h3 class="font-semibold">${p.title}</h3>
      <p class="text-emerald-600 font-bold">Rp ${p.price.toLocaleString('id-ID')}</p>
    </div>
  `).join('');
}

/* DETAIL */
function showDetail(id){
  const p=products.find(x=>x.id===id);
  if(!p) return;

  currentProduct=p;

  modalTitle.textContent=p.title;
  modalDesc.textContent=p.description;
  modalPrice.textContent="Rp "+p.price.toLocaleString('id-ID');

  const gallery=p.gallery?.length?p.gallery:[p.image.replace("images/","")];
  initSlider(gallery);

  detailModal.classList.remove('hidden');
}

/* SLIDER */
function initSlider(gallery){
  const track=sliderTrack;
  const dots=sliderDots;

  currentGallery=gallery;
  currentSlide=0;

  track.innerHTML=gallery.map((img,i)=>`
    <div class="w-full flex-shrink-0 h-56 relative cinematic-overlay">
      <img src="images/${img}"
           onclick="openFullscreen(${i})"
           class="cinematic-img w-full h-full object-cover cursor-zoom-in">
    </div>
  `).join('');

  dots.innerHTML=gallery.map((_,i)=>`
    <div onclick="goToSlide(${i})"
      class="w-2.5 h-2.5 bg-gray-300 rounded-full"></div>
  `).join('');

  updateSlider();
  startAutoSlide();
}

/* UPDATE */
function updateSlider(){
  sliderTrack.style.transform=`translateX(-${currentSlide*100}%)`;

  document.querySelectorAll('#sliderDots div').forEach((d,i)=>{
    d.classList.toggle('bg-black',i===currentSlide);
  });
}

/* NAV */
function nextSlide(){currentSlide=(currentSlide+1)%currentGallery.length;updateSlider();}
function prevSlide(){currentSlide=(currentSlide-1+currentGallery.length)%currentGallery.length;updateSlider();}
function goToSlide(i){currentSlide=i;updateSlider();}

/* AUTO */
function startAutoSlide(){clearInterval(autoSlideInterval);autoSlideInterval=setInterval(nextSlide,3000);}
function stopAutoSlide(){clearInterval(autoSlideInterval);}

/* CLOSE MODAL (FIXED) */
function closeModal(){
  detailModal.classList.add('hidden');
  stopAutoSlide();
}

/* FULLSCREEN */
function openFullscreen(i){
  currentSlide=i;
  fullscreenImage.src="images/"+currentGallery[i];
  fullscreenGallery.classList.remove('hidden');
}
function closeFullscreen(){
  fullscreenGallery.classList.add('hidden');
  zoomLevel=1;
  applyZoom();
}

/* ZOOM SAFE */
window.addEventListener('DOMContentLoaded',()=>{
  const img=document.getElementById('fullscreenImage');
  if(img){
    img.addEventListener('wheel',e=>{
      e.preventDefault();
      zoomLevel+=e.deltaY<0?0.1:-0.1;
      zoomLevel=Math.max(1,Math.min(3,zoomLevel));
      applyZoom();
    });
  }
});

function applyZoom(){
  fullscreenImage.style.transform=`scale(${zoomLevel})`;
}

/* SEARCH */
function filterProducts(){
  const k=searchInput.value.toLowerCase();
  renderCatalog(products.filter(p=>p.title.toLowerCase().includes(k)));
}

/* ORDER */
btnOrder.onclick=function(){
  if(!currentProduct)return;
  window.open(`https://wa.me/6285712130175?text=${encodeURIComponent(currentProduct.title)}`);
};

window.onload=loadProducts;
</script>

</body>
</html>
